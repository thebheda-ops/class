<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Course Enrollment Form</title>

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #222;
      }

      .wrapper {
        max-width: 680px;
        margin: 0 auto;
      }

      .header {
        text-align: center;
        margin-bottom: 20px;
      }

      .header .badge {
        font-size: 12px;
        color: #666;
        margin-bottom: 8px;
      }

      .header h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }

      .header p {
        margin-top: 8px;
        font-size: 14px;
        color: #555;
      }

      form {
        background: #fff;
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 20px;
      }

      fieldset {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 12px;
        margin-bottom: 16px;
      }

      legend {
        font-weight: bold;
        padding: 0 6px;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .field {
        margin-bottom: 12px;
      }

      .field:last-child {
        margin-bottom: 0;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #bbb;
        border-radius: 4px;
        font-family: Arial, sans-serif;
        font-size: 14px;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: #2f6fed;
        outline: none;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .radio-group,
      .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .radio-group label,
      .checkbox-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 0;
        font-weight: normal;
      }

      .radio-group input,
      .checkbox-group input {
        width: auto;
      }

      .btn-row {
        display: flex;
        gap: 10px;
      }

      input[type="submit"],
      input[type="reset"] {
        flex: 1;
        padding: 10px;
        border: 1px solid #999;
        border-radius: 4px;
        background: #e5e5e5;
        font-size: 14px;
        cursor: pointer;
      }

      input[type="submit"] {
        background: #2f6fed;
        border-color: #2f6fed;
        color: #fff;
      }

      input[type="submit"]:hover {
        background: #275fcb;
      }

      input[type="reset"]:hover {
        background: #d9d9d9;
      }

      @media (max-width: 600px) {
        body {
          padding: 12px;
        }

        form {
          padding: 14px;
        }

        .grid-2 {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <!-- Page Header -->
      <div class="header">
        <div class="badge">Assignment 3</div>
        <h1>Course Enrollment<br />Registration</h1>
        <p>Fill in your details to enroll in a course.</p>
      </div>

      <!-- Main Registration Form -->
      <form action="#" method="post">
        <!-- Section 1: Personal Information -->
        <fieldset>
          <legend>Personal Information</legend>

          <!-- Name & Email side by side -->
          <div class="grid-2">
            <!-- Name Input -->
            <div class="field">
              <label for="name">Full Name</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="John Doe"
                required
              />
            </div>

            <!-- Email Input -->
            <div class="field">
              <label for="email">Email Address</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="john@email.com"
                required
              />
            </div>
          </div>

          <!-- Password & DOB side by side -->
          <div class="grid-2">
            <!-- Password Input -->
            <div class="field">
              <label for="password">Password</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Create a password"
                required
              />
            </div>

            <!-- Date of Birth Input -->
            <div class="field">
              <label for="dob">Date of Birth</label>
              <input type="date" id="dob" name="dob" required />
            </div>
          </div>

          <!-- Gender Radio Buttons -->
          <div class="field">
            <label>Gender</label>
            <div class="radio-group">
              <label
                ><input type="radio" name="gender" value="male" required />
                Male</label
              >
              <label
                ><input type="radio" name="gender" value="female" />
                Female</label
              >
              <label
                ><input type="radio" name="gender" value="other" /> Other</label
              >
            </div>
          </div>

          <!-- Address Textarea -->
          <div class="field">
            <label for="address">Address</label>
            <textarea
              id="address"
              name="address"
              placeholder="Enter your full address"
              required
            ></textarea>
          </div>
        </fieldset>

        <!-- Section 2: Course Information -->
        <fieldset>
          <legend>Course Information</legend>

          <!-- Course Dropdown -->
          <div class="field">
            <label for="course">Select Course</label>
            <select id="course" name="course" required>
              <option value="">-- Choose a Course --</option>
              <option value="bca">BCA</option>
              <option value="csit">CSIT</option>
              <option value="bit">BIT</option>
            </select>
          </div>

          <!-- Skills Checkboxes -->
          <div class="field">
            <label>Skills</label>
            <div class="checkbox-group">
              <label
                ><input type="checkbox" name="skills" value="html" />
                HTML</label
              >
              <label
                ><input type="checkbox" name="skills" value="css" /> CSS</label
              >
              <label
                ><input type="checkbox" name="skills" value="js" />
                JavaScript</label
              >
              <label
                ><input type="checkbox" name="skills" value="python" />
                Python</label
              >
            </div>
          </div>
        </fieldset>

        <!-- Submit and Reset Buttons -->
        <div class="btn-row">
          <input type="submit" value="Submit Enrollment" />
          <input type="reset" value="Reset Form" />
        </div>
      </form>
    </div>
  </body>
</html>
